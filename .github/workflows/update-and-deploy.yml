name: Fetch & Deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 * * * *"  # Every hour
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    # Self-hosted runner required: API is only accessible inside the office VPN
    runs-on: [self-hosted, zorya-ci]

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch digests from API
        run: node scripts/fetch-digests.mjs
        env:
          DIGEST_API_URL: ${{ secrets.DIGEST_API_URL }}
          DIGEST_PUBLIC_TOKEN: ${{ secrets.DIGEST_PUBLIC_TOKEN }}

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
